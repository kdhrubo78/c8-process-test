<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 310" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Input Data (ovals) -->
  <ellipse cx="100" cy="35" rx="72" ry="22" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="100" y="40" text-anchor="middle" font-size="12" fill="#1a1a2e">Interest Rate</text>

  <ellipse cx="260" cy="35" rx="72" ry="22" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="260" y="40" text-anchor="middle" font-size="12" fill="#1a1a2e">Requested Loan</text>

  <ellipse cx="420" cy="35" rx="72" ry="22" fill="#e8f4fd" stroke="#3498db" stroke-width="1.5"/>
  <text x="420" y="40" text-anchor="middle" font-size="12" fill="#1a1a2e">Monthly Income</text>

  <!-- Lines: Inputs → Profitability -->
  <line x1="100" y1="57" x2="148" y2="123" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="260" y1="57" x2="205" y2="123" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Lines: Inputs → Risk -->
  <line x1="260" y1="57" x2="318" y2="123" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="420" y1="57" x2="375" y2="123" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Decision: Profitability -->
  <rect x="85" y="126" width="180" height="52" rx="5" fill="#fef5e7" stroke="#fc5d0d" stroke-width="1.5"/>
  <text x="175" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Profitability</text>
  <text x="175" y="164" text-anchor="middle" font-size="10" fill="#888">rate + loan → level</text>

  <!-- Decision: Risk -->
  <rect x="275" y="126" width="150" height="52" rx="5" fill="#fef5e7" stroke="#fc5d0d" stroke-width="1.5"/>
  <text x="350" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Risk</text>
  <text x="350" y="164" text-anchor="middle" font-size="10" fill="#888">loan + income → level</text>

  <!-- Lines: Decisions → Loan Approval -->
  <line x1="175" y1="178" x2="225" y2="218" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="350" y1="178" x2="300" y2="218" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Decision: Loan Approval -->
  <rect x="160" y="220" width="200" height="52" rx="5" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="260" y="242" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Loan Approval</text>
  <text x="260" y="258" text-anchor="middle" font-size="10" fill="#aaa">profitability + risk → approved?</text>

  <!-- Output arrow -->
  <line x1="260" y1="272" x2="260" y2="290" stroke="#888" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Output labels -->
  <rect x="200" y="294" rx="3" width="46" height="18" fill="#27ae60"/>
  <text x="223" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">true</text>
  <text x="260" y="307" text-anchor="middle" font-size="12" fill="#888">/</text>
  <rect x="274" y="294" rx="3" width="46" height="18" fill="#c0392b"/>
  <text x="297" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">false</text>
</svg>
