<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fc5d0d"/>
    </marker>
  </defs>

  <!-- Start Event -->
  <circle cx="40" cy="140" r="16" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="40" cy="140" r="6" fill="#1a1a2e"/>

  <!-- Arrow: Start → Pre-screen -->
  <line x1="56" y1="140" x2="88" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DMN: Pre-screen -->
  <rect x="90" y="110" width="140" height="60" rx="6" fill="#fef5e7" stroke="#fc5d0d" stroke-width="2"/>
  <text x="160" y="136" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">DMN</text>
  <text x="160" y="154" text-anchor="middle" font-size="11" fill="#666">Pre-screen</text>

  <!-- Arrow: Pre-screen → Gateway -->
  <line x1="230" y1="140" x2="268" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- XOR Gateway (diamond) -->
  <polygon points="290,110 320,140 290,170 260,140" fill="#fff" stroke="#1a1a2e" stroke-width="2.5"/>
  <text x="290" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">X</text>

  <!-- Label: Need more data? -->
  <text x="290" y="98" text-anchor="middle" font-size="10" fill="#888">Need more data?</text>

  <!-- === Upper path: YES → Call API → DMN Final → End === -->

  <!-- Arrow: Gateway → Call API (up) -->
  <line x1="305" y1="118" x2="365" y2="58" stroke="#fc5d0d" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <text x="322" y="78" font-size="10" font-weight="bold" fill="#fc5d0d">YES</text>

  <!-- Service Task: Call External API -->
  <rect x="367" y="28" width="130" height="55" rx="6" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/>
  <text x="432" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Call External</text>
  <text x="432" y="66" text-anchor="middle" font-size="11" fill="#666">API</text>
  <!-- Gear icon hint -->
  <rect x="480" y="32" width="12" height="12" rx="2" fill="#3498db" opacity="0.3"/>

  <!-- Arrow: Call API → DMN Final -->
  <line x1="497" y1="56" x2="518" y2="56" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DMN: Final Decision -->
  <rect x="520" y="28" width="110" height="55" rx="6" fill="#fef5e7" stroke="#fc5d0d" stroke-width="2"/>
  <text x="575" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">DMN</text>
  <text x="575" y="66" text-anchor="middle" font-size="11" fill="#666">Final Decision</text>

  <!-- Arrow: DMN Final → End (upper) -->
  <line x1="630" y1="56" x2="648" y2="56" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- End Event (upper) -->
  <circle cx="664" cy="56" r="14" fill="#fff" stroke="#1a1a2e" stroke-width="3.5"/>
  <circle cx="664" cy="56" r="6" fill="#1a1a2e"/>

  <!-- Label -->
  <text x="664" y="18" text-anchor="middle" font-size="10" fill="#555">Decision</text>
  <text x="664" y="29" text-anchor="middle" font-size="10" fill="#555">made</text>

  <!-- === Lower path: NO → End === -->

  <!-- Arrow: Gateway → End (down) -->
  <line x1="305" y1="162" x2="365" y2="222" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="322" y="206" font-size="10" font-weight="bold" fill="#27ae60">NO</text>

  <!-- End Event (lower) -->
  <circle cx="380" cy="230" r="14" fill="#fff" stroke="#1a1a2e" stroke-width="3.5"/>
  <circle cx="380" cy="230" r="6" fill="#1a1a2e"/>

  <!-- Label -->
  <text x="380" y="260" text-anchor="middle" font-size="10" fill="#555">Auto-decided</text>

  <!-- Legend at bottom -->
  <rect x="440" y="195" width="12" height="12" rx="2" fill="#fef5e7" stroke="#fc5d0d" stroke-width="1"/>
  <text x="458" y="206" font-size="10" fill="#666">DMN Decision</text>
  <rect x="440" y="215" width="12" height="12" rx="2" fill="#e8f4fd" stroke="#3498db" stroke-width="1"/>
  <text x="458" y="226" font-size="10" fill="#666">Service Task</text>
  <polygon points="446,241 452,248 446,255 440,248" fill="#fff" stroke="#1a1a2e" stroke-width="1"/>
  <text x="458" y="251" font-size="10" fill="#666">XOR Gateway</text>
</svg>
